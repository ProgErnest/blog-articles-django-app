{{posts}}
<!DOCTYPE html>
<html>
    <head>
        <title>Blog Jores</title>
    </head>
    <body>
        <header>
            <h1><a href="/">Blog Jores</a></h1>
        </header>
        {% for post in posts %}
            <article>
                <time>publication: {{post.published_date}}</time>
                <h2><a href="">{{post.title}}</a></h2>
                <p>{{post.text}} </p>
            </article>        
        {% endfor %}

    </body>
</html>
